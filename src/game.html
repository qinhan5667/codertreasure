<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>CoderTreasure</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --fg: #d4d4d4;
      --sidebar-bg: #181818;
      --activity-bar-bg: #181818;
      --tab-bg: #2d2d2d;
      --tab-active-bg: #1e1e1e;
      --tab-border: #252526;
      --line-number: #6e7681;
      --status-bar-bg: #007acc;
      --status-bar-fg: #ffffff;
      --border: #3e3e42;
      --selection: #264f78;
      --gutter-bg: #1e1e1e;
      --kw: #569cd6;
      --str: #ce9178;
      --cmt: #6a9955;
      --fn: #dcdcaa;
      --type: #4ec9b0;
      --num: #b5cea8;
      --tag: #569cd6;
      --attr: #9cdcfe;
      --op: #d4d4d4;
      --var: #d4d4d4;
      --hover-bg: #2a2d2e;
      --eliminated: #6a737d;
      --selected-bg: #264f78;
      --selected-fg: #ffffff;
      --error: #f14c4c;
      --hint-bg: rgba(77, 171, 247, 0.25);
    }

    :root.light {
      --bg: #ffffff;
      --fg: #333333;
      --sidebar-bg: #f3f3f3;
      --activity-bar-bg: #f3f3f3;
      --tab-bg: #ececec;
      --tab-active-bg: #ffffff;
      --tab-border: #e5e5e5;
      --line-number: #237893;
      --status-bar-bg: #007acc;
      --status-bar-fg: #ffffff;
      --border: #e5e5e5;
      --selection: #add6ff;
      --gutter-bg: #ffffff;
      --kw: #0000ff;
      --str: #a31515;
      --cmt: #008000;
      --fn: #795e26;
      --type: #267f99;
      --num: #098658;
      --tag: #0000ff;
      --attr: #e50000;
      --op: #000000;
      --var: #333333;
      --hover-bg: #e8e8e8;
      --eliminated: #6a737d;
      --selected-bg: #add6ff;
      --selected-fg: #000000;
      --error: #f14c4c;
      --hint-bg: rgba(0, 123, 255, 0.15);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: var(--vscode-font-family, 'Consolas', 'Monaco', 'Menlo', 'Courier New', monospace);
      font-size: var(--vscode-font-size, 14px);
      line-height: 1.6;
      background: var(--bg); color: var(--fg);
      letter-spacing: 0.3px;
    }

    .vscode-window { display: flex; flex-direction: column; width: 100%; height: 100%; }

    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }

    .tabs { display: flex; height: 35px; background: var(--tab-bg); border-bottom: 1px solid var(--border); overflow-x: hidden; }
    .tab { display: flex; align-items: center; padding: 0 12px; min-width: 120px; max-width: 220px; background: var(--tab-bg); border-right: 1px solid var(--tab-border); font-size: 12px; cursor: pointer; white-space: nowrap; gap: 6px; color: var(--fg); opacity: 0.8; transition: background 0.1s ease; }
    .tab:hover { background: var(--hover-bg); }
    .tab.active { background: var(--tab-active-bg); opacity: 1; border-top: 1px solid var(--status-bar-bg); }
    .tab-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 3px; color: #fff; font-weight: bold; }
    .tab-icon.vue { background: #42b883; }
    .tab-modified { font-size: 8px; color: var(--fg); opacity: 0.6; margin-left: 4px; }
    .tab-close { margin-left: auto; font-size: 14px; opacity: 0; transition: opacity 0.1s; }
    .tab:hover .tab-close { opacity: 0.5; }
    .tab-close:hover { opacity: 1; }

    .breadcrumb { height: 22px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: var(--fg); opacity: 0.7; background: var(--tab-active-bg); border-bottom: 1px solid var(--border); gap: 6px; }
    .breadcrumb span { cursor: default; }
    .breadcrumb .sep { opacity: 0.4; }

    .editor-body { flex: 1; display: flex; overflow: hidden; position: relative; min-height: 0; }

    .line-numbers { width: 52px; flex-shrink: 0; background: var(--gutter-bg); color: var(--line-number); text-align: right; padding: 12px 10px 0 0; font-size: var(--vscode-font-size, 14px); line-height: 1.6; user-select: none; overflow: hidden; font-family: inherit; }

    .code-content { flex: 1; overflow: auto; padding: 0; position: relative; min-width: 0; }
    /* VS Code-style thin scrollbar */
    .code-content::-webkit-scrollbar { width: 10px; height: 10px; }
    .code-content::-webkit-scrollbar-track { background: transparent; }
    .code-content::-webkit-scrollbar-thumb { background: rgba(121, 121, 121, 0.4); border-radius: 0; border: 2px solid transparent; background-clip: content-box; }
    .code-content::-webkit-scrollbar-thumb:hover { background: rgba(121, 121, 121, 0.7); border: 2px solid transparent; background-clip: content-box; }
    .code-content::-webkit-scrollbar-corner { background: transparent; }

    .code-file { padding: 12px 0 0 16px; font-size: var(--vscode-font-size, 14px); line-height: 1.6; font-family: inherit; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    .code-line { white-space: pre; padding: 0 12px 0 0; min-height: 1.6em; display: flex; }
    .code-line:hover { background: rgba(128,128,128,0.04); }
    /* Active line highlight (subtle, like VS Code) */
    .code-line.active-line { background: rgba(255,255,255,0.03); } /* dark */
    :root.light .code-line.active-line { background: rgba(0,0,0,0.03); }

    .keyword {
      cursor: pointer;
      border-radius: 2px;
      padding: 1px 2px;
      margin: -1px -2px;
      transition: background 0.1s ease;
      position: relative;
    }
    .keyword:hover { background: rgba(255,255,255,0.12); }
    :root.light .keyword:hover { background: rgba(0,0,0,0.08); }

    .keyword.selected {
      background: var(--selected-bg) !important;
      color: var(--selected-fg) !important;
    }
    .keyword.eliminated {
      color: var(--eliminated) !important;
      text-decoration: line-through !important;
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }
    .keyword.error {
      border-bottom: 2px solid var(--error);
      animation: shake 0.3s ease;
    }
    .keyword.hint {
      background: var(--hint-bg) !important;
      border-radius: 3px;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }

    @keyframes flash-green {
      0% { background: transparent; }
      30% { background: rgba(39, 201, 63, 0.3); }
      100% { background: transparent; }
    }
    .keyword.flash-ok { animation: flash-green 0.4s ease; }

    .mask-page { position: absolute; inset: 0; background: var(--bg); z-index: 10; display: none; flex-direction: row; }
    .mask-page.active { display: flex; }
    .mask-page .mask-content { flex: 1; padding: 12px 0 0 0; white-space: pre; font-size: var(--vscode-font-size, 14px); line-height: inherit; overflow: auto; color: var(--fg); font-family: inherit; }
    .mask-page .line-numbers { padding-top: 12px; }


    /* Status bar items look like VS Code native */
    .status-bar { height: 22px; background: var(--status-bar-bg); color: var(--status-bar-fg); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-size: 12px; user-select: none; }
    .status-item { cursor: default; transition: background 0.1s; padding: 0 4px; }
    .status-item.clickable { cursor: pointer; }
    .status-item.clickable:hover { background: rgba(255,255,255,0.12); }
    :root.light .status-item.clickable:hover { background: rgba(0,0,0,0.08); }
    .status-bar-left, .status-bar-right { display: flex; gap: 2px; align-items: center; }

    /* Combo flash in status bar */
    @keyframes combo-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; color: #4ec9b0; }
    }
    .combo-badge { display: none; font-weight: 600; }
    .combo-badge.active { display: inline; animation: combo-flash 0.6s ease 2; }

    .kw { color: var(--kw); } .str { color: var(--str); } .cmt { color: var(--cmt); }
    .fn { color: var(--fn); } .type { color: var(--type); } .num { color: var(--num); }
    .tag { color: var(--tag); } .attr { color: var(--attr); } .op { color: var(--op); } .var { color: var(--var); }
    .punct { color: var(--fg); opacity: 0.7; }
    .mustache { color: #dcdcaa; }
    .css-prop { color: #9cdcfe; }
    .css-val { color: #ce9178; }
    .css-sel { color: #d7ba7d; }
    .tag-delimiter { color: #808080; }

    .toast { position: fixed; bottom: 30px; right: 16px; background: var(--tab-bg); color: var(--fg); padding: 6px 12px; border-radius: 3px; font-size: 12px; z-index: 100; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; border: 1px solid var(--border); }
    .toast.show { opacity: 0.85; }

    .victory-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; }
    .victory-overlay.active { display: flex; }
    .victory-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 32px 48px; text-align: center; }
    .victory-card h2 { margin: 0 0 8px 0; color: #27c93f; }
    .victory-card p { margin: 0; color: var(--fg); opacity: 0.8; }
  </style>
</head>
<body>
  <div class="vscode-window">
    <div class="editor-area">
        <div class="tabs" id="tabs">
          <div class="tab active"><span class="tab-icon vue">V</span><span>AuditTimeline.vue</span><span class="tab-modified">&#9679;</span><span class="tab-close">&#215;</span></div>
        </div>
        <div class="breadcrumb">
          <span>graziery</span><span class="sep">/</span><span>src</span><span class="sep">/</span><span>views</span><span class="sep">/</span><span>taskAudit</span><span class="sep">/</span><span style="opacity:1;">AuditTimeline.vue</span>
        </div>
        <div class="editor-body">
          <div class="line-numbers" id="line-numbers"></div>
          <div class="code-content" id="code-content">
            <div class="code-file" id="code-file"></div>
          </div>
          <div class="mask-page" id="mask-page">
            <div class="line-numbers" id="mask-line-numbers"></div>
            <div class="mask-content" id="mask-content"></div>
          </div>
        </div>
        <div class="status-bar">
          <div class="status-bar-left">
            <span class="status-item" id="git-branch" title="Git branch: main (decorative)">&#9654; main</span>
            <span class="status-item" id="code-issues" title="Remaining duplicate pairs to eliminate">&#10007; 8</span>
            <span class="status-item clickable" id="hint-btn" title="Find next duplicate pair">&#128269;</span>
            <span class="status-item clickable" id="lang-label" title="Switch level: click to change file (Vue / Java / TS)">Vue</span>
            <span class="combo-badge" id="combo-text"></span>
          </div>
          <div class="status-bar-right">
            <span id="position-text" title="Cursor position">Ln 1, Col 1</span><span title="File encoding">UTF-8</span><span title="Indentation">Spaces: 2</span><span id="reset-btn" class="status-item clickable" title="Reload current level">&#8635;</span>
          </div>
        </div>
      </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="victory-overlay" id="victory-overlay">
    <div class="victory-card">
      <h2>Review Complete!</h2>
      <p id="victory-score">Score: 0</p>
      <p id="victory-time">Time: 0:00</p>
      <p style="margin-top:16px;opacity:0.6;font-size:12px;">All duplicates eliminated. Code refactored.</p>
    </div>
  </div>

  <script>
  (function() {
    // ========== 1. Multi-Level System ==========
    // Levels defined in section 4 below, referenced via getCurrentLevel()

    // ========== 2. Game State ==========
    let selectedKeyword = null;
    let pairsLeft = 0; // set by currentLevel
    let score = 0;
    let combo = 0;
    let lock = false;
    let isMaskActive = false;
    let startTime = Date.now();
    let keywordElements = [];
    let pairMap = {};
    let currentLevelIdx = 0;

    const codeFile = document.getElementById('code-file');
    const lineNumbers = document.getElementById('line-numbers');
    const codeIssues = document.getElementById('code-issues');
    const comboText = document.getElementById('combo-text');
    const positionText = document.getElementById('position-text');
    const toast = document.getElementById('toast');
    const victoryOverlay = document.getElementById('victory-overlay');
    const maskPage = document.getElementById('mask-page');
    const maskContent = document.getElementById('mask-content');
    const maskLineNumbers = document.getElementById('mask-line-numbers');
    const tabLabel = document.querySelector('.tab span:nth-child(2)');
    const tabIcon = document.querySelector('.tab-icon');

    // ========== 3. Syntax Highlighting (VS Code Dark+ compatible) ==========
    function escHtml(t) {
      return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // JS/TS keywords
    const JS_KW = new Set(['import','from','export','default','const','let','var','function','return',
      'if','else','for','while','do','switch','case','break','continue','class','extends','new',
      'async','await','true','false','null','undefined','this','typeof','instanceof','in','of',
      'try','catch','finally','throw','delete','void','with','debugger','as','yield','super',
      'get','set','static','typeof','enum','implements','interface','type','namespace','module',
      'declare','abstract','readonly','public','private','protected','keyof']);
    const VUE_KW = new Set(['ref','reactive','computed','watch','onMounted','onUnmounted',
      'onCreated','defineProps','defineEmits','defineExpose','defineOptions','useDict',
      'toRefs','nextTick','provide','inject','watchEffect','toRef','shallowRef']);

    // Current SFC block tracking
    let currentBlock = 'template'; // 'template' | 'script' | 'style'

    function resetBlockState(lineIdx) {
      if (lineIdx < 23) currentBlock = 'template';
      else if (lineIdx < 50) currentBlock = 'script';
      else currentBlock = 'style';
    }

    function highlightLine(line, lineIdx) {
      resetBlockState(lineIdx);
      if (currentBlock === 'template') return highlightTemplate(line);
      if (currentBlock === 'script') return highlightJS(line);
      return highlightCSS(line);
    }

    function highlightTemplate(line) {
      let html = '';
      let i = 0;
      while (i < line.length) {
        // Mustache expression {{ ... }}
        if (line.substr(i, 2) === '{{' || line.substr(i, 2) === '{') {
          let closeIdx = line.indexOf('}}', i + 2);
          if (closeIdx < 0) { html += escHtml(line[i]); i++; continue; }
          html += '<span class="tag-delimiter">{{</span>';
          html += highlightJS(line.substring(i + 2, closeIdx), true);
          html += '<span class="tag-delimiter">}}</span>';
          i = closeIdx + 2;
          continue;
        }
        // v- directives as attributes
        if (i === 0 && /^\s*v-/.test(line)) {
          // Handle directive line
          let j = i;
          while (j < line.length && /\S/.test(line[j])) j++;
          const word = line.substring(i, j).trim();
          if (/^v-|:|@|#/.test(word)) {
            html += '<span class="attr">' + escHtml(word) + '</span>';
            i = j;
            continue;
          }
        }
        // HTML comment
        if (line.substr(i, 4) === '<!--') {
          let end = line.indexOf('-->', i + 4);
          if (end < 0) end = line.length; else end += 3;
          html += '<span class="cmt">' + escHtml(line.substring(i, end)) + '</span>';
          i = end; continue;
        }
        // HTML tag open/close
        if (line[i] === '<') {
          let isClose = false;
          let j = i + 1;
          if (line[j] === '/') { isClose = true; j++; }
          // Read tag name
          let tagName = '';
          while (j < line.length && /[a-zA-Z]/.test(line[j])) { tagName += line[j]; j++; }
          if (tagName) {
            // Tag delimiter + name
            html += '<span class="tag-delimiter">&lt;' + (isClose ? '/' : '') + '</span>';
            html += '<span class="tag">' + escHtml(tagName) + '</span>';
            i = j;

            // Now parse attributes until >
            while (i < line.length && line[i] !== '>' && line[i] !== '/' && line[i] <= ' ') i++;

            // Parse attributes: name="value" or :name=value or @event=handler
            while (i < line.length && line[i] !== '>' && line[i] !== '/') {
              // skip whitespace
              while (i < line.length && (line[i] === ' ' || line[i] === '\t')) {
                html += escHtml(line[i]); i++;
              }
              if (i >= line.length || line[i] === '>' || line[i] === '/') break;

              // Attribute name (may start with :, @, #, v-)
              let attrName = '';
              if (/:|@|#|v-/.test(line[i])) attrName += line[i++];

              while (i < line.length && /[a-zA-Z_\-][a-zA-Z0-9_\-\.]*/.test(line.substr(i, Math.min(20, line.length - i)))) {
                attrName += line[i]; i++;
              }

              if (attrName) {
                html += ' ';
                html += '<span class="attr">' + escHtml(attrName) + '</span>';

                // Skip whitespace to =
                while (i < line.length && line[i] === ' ') { html += escHtml(line[i]); i++; }

                // =
                if (i < line.length && line[i] === '=') {
                  html += '<span class="punct">=</span>'; i++;
                  // skip ws
                  while (i < line.length && line[i] === ' ') { html += escHtml(line[i]); i++; }
                  // Attribute value (quoted)
                  if (i < line.length && (line[i] === '"' || line[i] === "'" || line[i] === '`')) {
                    const q = line[i];
                    let valStart = i + 1;
                    let valEnd = valStart;
                    while (valEnd < line.length && line[valEnd] !== q) { if (line[valEnd] === '\\') valEnd++; valEnd++; }
                    // Check if attribute value looks like JS (contains {{ }} or is binding)
                    const rawVal = line.substring(valStart, valEnd);

                    html += '<span class="tag-delimiter">' + escHtml(q) + '</span>';

                    // If it's a bound attribute with possible JS inside, highlight inner content
                    if (rawVal.includes('{{')) {
                      // Split by {{ }}
                        let vi = 0;
                        while (vi < rawVal.length) {
                          if (rawVal.substr(vi, 2) === '{{') {
                            let vc = rawVal.indexOf('}}', vi + 2);
                            if (vc < 0) { html += escHtml(rawVal[vi]); vi++; continue; }
                            html += escHtml(rawVal.substring(vi, vi + 2));
                            html += highlightJS(rawVal.substring(vi + 2, vc), true);
                            html += '}}';
                            vi = vc + 2;
                          } else {
                            html += escHtml(rawVal[vi]); vi++;
                          }
                        }
                      } else if (attrName.startsWith(':') || attrName.startsWith('@') || attrName.startsWith('v-')) {
                        // Dynamic binding - treat as JS
                        html += '<span class="str">' + escHtml(rawVal) + '</span>';
                      } else {
                        html += '<span class="str">' + escHtml(rawVal) + '</span>';
                      }
                    html += '<span class="tag-delimiter">' + escHtml(q) + '</span>';
                    i = valEnd + 1;
                  } else {
                    // unquoted value
                    let valStart = i;
                    while (i < line.length && /[^\s>\/]/.test(line[i])) i++;
                    if (i > valStart) html += '<span class="str">' + escHtml(line.substring(valStart, i)) + '</span>';
                  }
                }
              } else {
                html += escHtml(line[i]); i++;
              }
            }
            // Closing >
            if (i < line.length && (line[i] === '>' || line[i] === '/')) {
              if (line[i] === '/') { html += '<span class="tag-delimiter">/</span>'; i++; }
              if (i < line.length && line[i] === '>') { html += '<span class="tag-delimiter">&gt;</span>'; i++; }
            }
            continue;
          }
          // Not a tag, just output <
          html += '&lt;'; i++;
          continue;
        }
        // Plain text content (indentation etc)
        html += escHtml(line[i]);
        i++;
      }
      return html;
    }

    function highlightJS(line, isInline) {
      let html = '';
      let i = 0;
      while (i < line.length) {
        // Single-line comment
        if (!isInline && line.substr(i, 2) === '//') {
          html += '<span class="cmt">' + escHtml(line.substr(i)) + '</span>';
          break;
        }
        // Block comment start
        if (line.substr(i, 2) === '/*') {
          let j = line.indexOf('*/', i + 2);
          if (j < 0) j = line.length; else j += 2;
          html += '<span class="cmt">' + escHtml(line.substring(i, j)) + '</span>';
          i = j; continue;
        }
        // String literals
        if (line[i] === '"' || line[i] === "'" || line[i] === '`') {
          const q = line[i];
          let j = i + 1;
          // For backtick strings (template literals), handle ${} expressions
          if (q === '`') {
            let strContent = '';
            while (j < line.length && line[j] !== '`') {
              if (line[j] === '\\') { strContent += line[j] + (line[j+1] || ''); j += 2; continue; }
              if (line.substr(j, 2) === '${') {
                // Find matching }
                let depth = 1;
                let k = j + 2;
                while (k < line.length && depth > 0) {
                  if (line[k] === '{') depth++;
                  else if (line[k] === '}') depth--;
                  if (depth > 0) k++;
                }
                strContent += '${';
                strContent += highlightJS(line.substring(j + 2, k), true);
                strContent += '}';
                j = k;
              } else {
                strContent += line[j];
                j++;
              }
            }
            if (j < line.length) j++; // closing `
            html += '<span class="str">`' + strContent + '`</span>';
          } else {
            while (j < line.length && line[j] !== q) { if (line[j] === '\\') j++; j++; }
            html += '<span class="str">' + escHtml(line.substring(i, j + (j < line.length ? 1 : 0))) + '</span>';
            if (j < line.length) j++;
          }
          i = j; continue;
        }
        // Regex literal
        if (!isInline && line[i] === '/' && i > 0 && /[\s(=[,!?:]$/.test(line[i - 1] || ' ')) {
          let j = i + 1;
          while (j < line.length && line[j] !== '/') { if (line[j] === '\\') j++; j++; }
          if (j < line.length) {
            j++; // include flags
            while (j < line.length && /[gimsuy]/.test(line[j])) j++;
            html += '<span class="str">' + escHtml(line.substring(i, j)) + '</span>';
            i = j; continue;
          }
        }
        // Numbers (including .5, 0x, 1e3, etc.)
        if (/[0-9]/.test(line[i]) || (line[i] === '.' && i + 1 < line.length && /[0-9]/.test(line[i + 1]))) {
          let j = i;

import { computed, ref, defineOptions, defineExpose } from 'vue';
import { useDict } from '@/store/dict';
import { getImage, getLabel } from '@/utils/utils.js';
import { getAuditLogByUuid } from '@/api/taskList';

const { biz_audit_log } = useDict('biz_audit_log');

defineOptions({
    name: 'AuditTimeline'
});

const props = defineProps({
    modelValue: {
        type: String,
        default: ''
    }
});

const emit = defineEmits(['update:modelValue']);

const auditOpinion = computed({
    get: () => props.modelValue,
    set: (val) => emit('update:modelValue', val)
});

const auditList = ref([]);

const fetchAuditLog = (uuid) => {
    if (!uuid) {
        console.warn('缺少 uuid，无法获取审核日志');
        auditList.value = [];
        return;
    }

    getAuditLogByUuid(uuid).then(res => {
        if (res.code === 200) {
            auditList.value = formatAuditLog(res.rows);
        } else {
            console.warn('获取审核日志失败:', res.msg);
            auditList.value = [];
        }
    }).catch(err => {
        console.error('获取审核日志异常:', err);
        auditList.value = [];
    });
};

const formatAuditLog = (data) => {
    if (!data || !Array.isArray(data)) return [];

    return data.map(log => {
        const stateLabel = getLabel(log.state, biz_audit_log.value);
        const isApproved = log.state === 3;
        const isRejected = log.state === 2;

        return {
            status: isApproved ? 'approved' : (isRejected ? 'rejected' : 'pending'),
            title: \`\${log.nickName || '未知用户'} 核审 \${stateLabel || '状态未知'} (\${log.roleName || '角色未知'})\`,
            reason: log.desc || '',
            date: log.createTime || '',
            auditor: log.nickName || log.createBy || '',
            state: log.state
        };
    }).sort((a, b) => new Date(a.date) - new Date(b.date));
};

defineExpose({ fetchAuditLog });
